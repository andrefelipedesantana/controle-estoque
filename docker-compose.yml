version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: farmacia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 741852963
      POSTGRES_DB: Farmacia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
